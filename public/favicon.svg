<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Nexora Funding Limited — favicon.svg

    Layer order:
      1. White background rect (full-bleed, rx=80) — transparent corners let tab bar show through.
         "Floating square" look rather than a hard box.
      2. Hairline border rect (inset 10px, rx=70, #E5E7EB, 16px stroke ≈ 0.5px at 32×32).
         Provides edge definition on white chrome without visual weight.
      3. Icon group scaled to 90% centered on viewBox midpoint (512,512).
         translate(51.2,51.2) scale(0.90) = scale around (512,512).
         Resulting padding ≈ 4px on all sides at 32×32 display.

    Verified padding at display sizes (icon natural bbox x:100→935, y:93→935):
      16×16 → ~2.2px padding all sides
      32×32 → ~4.4px padding all sides
      48×48 → ~6.6px padding all sides
  -->

  <!-- Layer 1: white rounded-square background -->
  <rect width="1024" height="1024" rx="80" fill="#ffffff"/>

  <!-- Layer 2: hairline border (inset so outer stroke edge sits at x/y=2, fully inside viewBox) -->
  <rect x="10" y="10" width="1004" height="1004" rx="70"
        fill="none" stroke="#E5E7EB" stroke-width="16"/>

  <!-- Layer 3: Nexora icon at 90%, scaled around centre (512,512) for even padding -->
